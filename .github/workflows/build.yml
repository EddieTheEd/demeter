name: Build

on:
  push:
    branches:
      - main 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Cache build artifacts
        uses: actions/cache@v2
        with:
          path: |
           ~/.cargo/registry
           ~/.cargo/git
           target
          key: ${{ runner.os }}-rust-${{ hashFiles('src/**')}}-${{ hashFiles('**/Cargo.lock') }}

      - name: Git config
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git config --global http.postBuffer 524288000 #so big files dont kill the workflow

      - name: Build and run Blaze
        run: |
          cargo run --release

      - name: Move output
        run: |
          mv output/* . && rmdir output
          touch '.nojekyll'
          
      - name: Custom Domain
        run: |
          touch 'CNAME'
          echo "demeter.toomwn.xyz" > 'CNAME'

      - name: Get commit message from main branch
        id: get_commit_message
        run: echo "::set-output name=message::$(git log -1 --pretty=%B)"          

      - name: Update master
        run: |
          git checkout -b master
          git add .
          git commit -m "${{ steps.get_commit_message.outputs.message }}"
          git push origin master --force

