<!DOCTYPE html>
<html lang="en">
<head>
  <title>Demeter</title>
  <meta name="description" content="Demeter, a study tool using Google Docs viewer.">

  <meta property="og:url" content="https://demeter.toomwn.xyz">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Demeter">
  <meta property="og:description" content="Demeter, a study tool using Google Docs viewer.">
  <meta property="og:image" content="https://demeter.toomwn.xyz/favicon.png/">

  <meta name="twitter:card" content="summary_large_image">
  <meta property="twitter:domain" content="demeter.toomwn.xyz">
  <meta property="twitter:url" content="https://demeter.toomwn.xyz">
  <meta name="twitter:title" content="Demeter">
  <meta name="twitter:description" content="Demeter, a study tool using Google Docs viewer.">
  <meta name="twitter:image" content="https://demeter.toomwn.xyz/favicon.png/">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preload" href="main.css" as="style">
  <link rel="preload" href="main.js" as="script">
  <link rel="stylesheet" href="main.css"/>
    
</head>
<body>
    <header>
      <div id="title">
        <img src="favicon.ico" alt="Icon" width="30px" height="30px" id="icon">
         <h1>Demeter</h1>
      </div>
      <div id="description">
        <p>Load document files (pdf, docx) in one page, and mark visited files. Uses Google Docs viewer. <a href="https://github.com/EddieTheEd/demeter">See repo here.</a></p>

        <button id="save" onclick="save()" style="margin:15px">Save data as JSON</button>

        <strong style="margin-top:15px">Load JSON file (will overwrite existing data): </strong>

        <form style="margin:15px">
          <input type="file" id="fileInput" accept=".json">
        </form>

      </div>
    </header>
    <div id="page">
      <div id="LHS">
        <div id="filetree"></div>
      </div>
      <div id="RHS">
        <div id="grid2">
          <div id="fileheader">
            <h3 id="fileh3"></h3>
            <input type="checkbox" id="readbox" onchange="markRead()">
            <label for="readbox">Mark as read</label>
            
            <input type="checkbox" id="reviewbox" onchange="markReview()">
            <label for="reviewbox">Mark for review</label> 

            <br>
            
            <input type="checkbox" id="readclearbox" onchange="clearRead()">
            <label for="readclearbox">Clear read files</label>
            
            <input type="checkbox" id="reviewclearbox" onchange="clearReview()">
            <label for="reviewclearbox">Clear review files</label>

            <br>

            <input type="checkbox" id="openreadbox" onchange="openRead()">
            <label for="openreadbox">Open all read files</label>
            
            <input type="checkbox" id="openreviewbox" onchange="openReview()">
            <label for="openreviewbox">Open all files for review</label>

            <br><br>

            <button id="downloadButton" onclick="download()">Open/Download</button>

            <br><br>

            <li id="actualli">Depends on how your browser treats the document file.</li>
          </div>
          <div id="col2">
            <h1 id="timer">00:00:00</h1>
            <button onclick="addHour()">+1 hour</button>
            <button onclick="addThirty()">+30 minutes</button>
            <button onclick="addTen()">+10 minutes</button>
            <button onclick="addMin()">+1 minute</button>
            <br>
            <button onclick="startCountdown(5)">Start Countdown</button>
            <button onclick="stopCountdown()">Stop Countdown</button>
            <button onclick="resetCountdown()">Reset Countdown</button>
          </div>
          <div id="col3">
            <div id="notesheader">
              <h3>File notes:</h3>
              <div style="padding-top:21px">
                <input type="checkbox" id="writeclearbox" onchange="clearWrite()">
                <label for="writeclearbox">Clear file notes</label>
              </div>
            </div>
            <textarea type="text" id="notes"></textarea>
          </div>
        </div>
        <div id="viewer">
          <iframe src="" width="100%" height="100%"></iframe>
        </div>
      </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
