<!DOCTYPE html>
<html lang="en">
<head>
    <title>Demeter</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preload" href="main.css" as="style">
    <link rel="preload" href="main.js" as="script">
    <link rel="stylesheet" href="main.css"/>
    
</head>
<body>
    <header>
      <h1>Demeter</h1>
      <p>Load document files (pdf, docx) in one page, and mark visited files. Uses Google Docs viewer.</p>
    </header>
    <div id="page">
      <div id="LHS">
        <div id="filetree"></div>
      </div>
      <div id="RHS">
        <div id="grid2">
          <div id="fileheader">
            <h3 id="fileh3"></h3>
            <input type="checkbox" id="readbox" onchange="markRead()">
            <label for="readbox">Mark as read</label>
            
            <input type="checkbox" id="reviewbox" onchange="markReview()">
            <label for="reviewbox">Mark for review</label> 
            
            <input type="checkbox" id="readclearbox" onchange="clearRead()">
            <label for="readclearbox">Clear read files</label>
            
            <input type="checkbox" id="reviewclearbox" onchange="clearReview()">
            <label for="reviewclearbox">Clear review files</label>

            <br><br>

            <button id="downloadButton" onclick="download()">Open/Download</button>

            <br><br>

            <li id="actualli">Depends on how your browser treats the document file.</li>
          </div>
          <div id="col2">
            <h1 id="timer">00:00:00</h1>
            <button onclick="addHour()">+1 hour</button>
            <button onclick="addThirty()">+30 minutes</button>
            <button onclick="addTen()">+10 minutes</button>
            <button onclick="addMin()">+1 minute</button>
            <br>
            <button onclick="startCountdown(5)">Start Countdown</button>
            <button onclick="stopCountdown()">Stop Countdown</button>
            <button onclick="resetCountdown()">Reset Countdown</button>
          </div>
          <div id="col3">
           <h3>File notes:</h3>
            <textarea type="text" id="notes"></textarea>
          </div>
        </div>
        <div id="viewer">
            <iframe src="" width="100%" height="100%"></iframe>
        </div>
      </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
